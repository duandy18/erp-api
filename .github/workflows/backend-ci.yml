name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp
          POSTGRES_DB: erp
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U erp -d erp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      ERP_DATABASE_URL: postgresql+psycopg://erp:erp@127.0.0.1:5433/erp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python3 -m venv .venv
          .venv/bin/python3 -m pip install -U pip
          .venv/bin/python3 -m pip install -e ".[dev]"

      - name: Lint
        run: make lint

      - name: Routes
        run: make routes

      - name: OpenAPI
        run: make openapi

      - name: DB smoke
        run: make db-smoke

      - name: Alembic upgrade
        run: make upgrade-dev

      - name: Alembic current
        run: make alembic-current

      - name: Alembic check
        run: make alembic-check

      - name: Test
        run: make test
